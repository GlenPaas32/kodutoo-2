<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="typer.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>Typer</title>
</head>
<body>
    <div id="name" class="container">
        <label for="name">Sisesta oma nimi</label>
        <input type="text" id="username">
        <input type="button" value="Salvesta" id="submitname">
    </div>

    <div id="counter" class="container">
        <div id="time"></div>
    </div>

    <div id="info" class="container">
        <div id="wordcount"></div>
    </div>

    <div id="wordContainer" class="container">
        <div id="word"></div>
        <div id="score"></div>
    </div>

    <div id="resultsContainer" class="container">
        <h2>TOP 20</h2>
        <div id="results">
        </div>
    </div>
    
</body>
</html>
